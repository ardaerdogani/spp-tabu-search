  <line x1="90" y1="340" x2="720" y2="340" stroke="#1f2933" stroke-width="2"/>
  <line x1="90" y1="70" x2="90" y2="340" stroke="#1f2933" stroke-width="2"/>
  <line x1="90" y1="340.0" x2="720" y2="340.0" stroke="#d9e2ec" stroke-width="1"/>
