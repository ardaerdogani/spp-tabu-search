  <text x="326.2" y="330.0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#102a43">0.0</text>
  <rect x="438.8" y="340.0" width="90.0" height="0.0" rx="8" fill="#1f7a8c"/>
