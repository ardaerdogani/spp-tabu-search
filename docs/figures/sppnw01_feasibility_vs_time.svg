  <line x1="90" y1="137.5" x2="720" y2="137.5" stroke="#d9e2ec" stroke-width="1"/>
  <text x="78" y="141.5" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#52606d">0.75</text>
  <line x1="90" y1="70.0" x2="720" y2="70.0" stroke="#d9e2ec" stroke-width="1"/>
  <text x="78" y="74.0" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#52606d">1.00</text>
